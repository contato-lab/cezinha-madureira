name: Gerar Relatorio Social Cezinha (manual)

on:
  workflow_dispatch:

jobs:
  gerar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerar relatorio social
        env:
          META_TOKEN_CEZINHA: ${{ secrets.META_TOKEN_CEZINHA }}
        run: python gerar-relatorio-social.py

      - name: Commit relatorio-social-data.json
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          [ -f relatorio-social-data.json ] && git add relatorio-social-data.json || true
          if git diff --staged --quiet; then
            echo "Sem mudancas em relatorio-social-data.json"
            exit 0
          fi
          git commit -m "chore: gera relatorio social Cezinha [skip ci]"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main 2>&1 || {
              git rebase --abort 2>/dev/null || true
              git add relatorio-social-data.json || true
              git diff --staged --quiet || git commit -m "chore: gera relatorio social Cezinha [skip ci]" --allow-empty
            }
            if git push 2>&1; then
              echo "Push OK na tentativa $attempt"
              exit 0
            fi
            sleep $((RANDOM % 10 + 5))
          done
          echo "ERRO: push falhou apos 5 tentativas"
          exit 1
